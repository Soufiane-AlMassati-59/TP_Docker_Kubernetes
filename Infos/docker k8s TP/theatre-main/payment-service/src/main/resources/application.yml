server:
  port: 8082
  servlet:
    context-path: /payment

spring:
  application:
    name: payment-service
    
  datasource:
    url: jdbc:postgresql://localhost:5432/theatre_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    
  security:
    user:
      name: admin
      password: admin

